# Starship prompt — https://starship.rs/config/
# Requires a Nerd Font (JetBrains Mono Nerd Font recommended)

"$schema" = "https://starship.rs/config-schema.json"

format = """
[╭─](bold blue)\
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_metrics\
$python\
$terraform\
$kubernetes\
$azure\
$docker_context\
$cmd_duration\
$line_break\
[╰─](bold blue)$character"""

# ── Prompt character ──────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

# ── OS icon ───────────────────────────────────────────────────────────────────
[os]
disabled = false
format   = "[$symbol](bold white) "

[os.symbols]
Macos = ""

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
style            = "bold cyan"
truncation_length = 4
truncate_to_repo = true
format           = "[$path]($style)[$read_only]($read_only_style) "

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style  = "bold purple"

[git_status]
format   = "([$all_status$ahead_behind]($style) )"
style    = "bold yellow"
ahead    = "⇡${count}"
behind   = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
staged   = "+${count}"
untracked = "?${count}"
stashed  = "📦"

[git_metrics]
disabled         = false
added_style      = "bold green"
deleted_style    = "bold red"

# ── Python ────────────────────────────────────────────────────────────────────
[python]
symbol           = " "
format           = '[$symbol$pyenv_prefix($version )(\($virtualenv\) )]($style)'
style            = "bold yellow"
detect_files     = ["requirements.txt", "pyproject.toml", ".python-version", "Pipfile", "setup.py"]

# ── Terraform ─────────────────────────────────────────────────────────────────
[terraform]
symbol    = "󱁢 "
format    = "[$symbol$workspace]($style) "
style     = "bold 105"
detect_extensions = ["tf", "tfvars"]

# ── Kubernetes ────────────────────────────────────────────────────────────────
[kubernetes]
disabled = false
symbol   = "☸ "
format   = "[$symbol$context(\\($namespace\\))]($style) "
style    = "bold blue"

# ── Azure ─────────────────────────────────────────────────────────────────────
[azure]
disabled = false
format   = "[$symbol($subscription)]($style) "
symbol   = "󰠅 "
style    = "bold blue"

# ── Docker ────────────────────────────────────────────────────────────────────
[docker_context]
symbol = " "
format = "[$symbol$context]($style) "
style  = "bold blue"
only_with_files = true

# ── Command duration ─────────────────────────────────────────────────────────
[cmd_duration]
min_time          = 2000
format            = "[ $duration]($style) "
style             = "bold yellow"
show_notifications = true

# ── Username / hostname (shown only over SSH) ────────────────────────────────
[username]
show_always = false
style_user  = "bold green"
format      = "[$user]($style)@"

[hostname]
ssh_only = true
format   = "[$hostname](bold red) "

# ── Time ─────────────────────────────────────────────────────────────────────
[time]
disabled  = false
format    = "[$time]($style) "
style     = "dimmed white"
time_format = "%H:%M"
